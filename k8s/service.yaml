apiVersion: v1
kind: Service
metadata:
  name: churn-api
spec:
  selector:
    app: churn-api        # matches pods with this label
  type: NodePort          # exposes on a port on the minikube node
  ports:
  - protocol: TCP
    port: 80              # service port (cluster-internal)
    targetPort: 8000      # container port
    nodePort: 30080       # external port on the node (30000-32767)
